services:
  postgres:
    image: postgres:18
    container_name: igmarkets-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: igmarkets
      POSTGRES_USER: igmarkets
      POSTGRES_PASSWORD: igmarkets
    ports:
      - "5432:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igmarkets"]
      interval: 5s
      timeout: 5s
      retries: 5
